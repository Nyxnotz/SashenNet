<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Геометри Подмышка</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Comic+Neue:wght@700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a0033;
      font-family: 'Comic Neue', 'Comic Sans MS', cursive;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* MENU */
    #menu {
      text-align: center;
      z-index: 10;
    }

    .game-title {
      font-family: 'Boogaloo', cursive;
      font-size: 3.5rem;
      color: #ffff00;
      text-shadow: 4px 4px 0 #ff00ff, 8px 8px 0 #00ffff, -2px -2px 0 #ff0000;
      margin-bottom: 4px;
      animation: wobble 0.5s infinite alternate;
    }

    @keyframes wobble {
      from { transform: rotate(-1deg) scale(1); }
      to { transform: rotate(1deg) scale(1.03); }
    }

    .subtitle {
      font-size: 0.85rem;
      color: #ff88ff;
      margin-bottom: 30px;
      font-style: italic;
    }

    .levels-title {
      font-size: 1.2rem;
      color: #00ffff;
      margin-bottom: 16px;
      text-shadow: 2px 2px 0 #0000ff;
    }

    .level-btn {
      display: block;
      width: 280px;
      margin: 8px auto;
      padding: 12px 20px;
      font-family: 'Comic Neue', cursive;
      font-size: 1rem;
      font-weight: 700;
      border: 3px solid #fff;
      border-radius: 0;
      cursor: pointer;
      transition: transform 0.1s;
      text-align: left;
    }
    .level-btn:hover { transform: scale(1.05); }
    .level-btn:active { transform: scale(0.97); }

    .level-btn.lv1 { background: #00cc44; color: #000; border-color: #00ff66; }
    .level-btn.lv2 { background: #ff6600; color: #fff; border-color: #ffaa00; }
    .level-btn.lv3 { background: #cc0000; color: #fff; border-color: #ff4444; }

    .level-stars { color: #ffdd00; float: right; }

    .copyright {
      margin-top: 24px;
      font-size: 0.65rem;
      color: #555;
    }

    /* GAME */
    #game { display: none; position: relative; width: 100vw; height: 100vh; }

    canvas { display: block; }

    #hud {
      position: absolute;
      top: 10px;
      left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 1rem;
      color: #fff;
      text-shadow: 1px 1px 0 #000;
      pointer-events: none;
    }

    #back-btn {
      position: absolute;
      top: 10px;
      left: 16px;
      padding: 4px 12px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: 1px solid #555;
      font-family: 'Comic Neue', cursive;
      font-size: 0.8rem;
      cursor: pointer;
      z-index: 20;
    }

    /* DEATH / WIN overlays */
    #overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.75);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }
    #overlay.show { display: flex; }

    #overlay-title {
      font-family: 'Boogaloo', cursive;
      font-size: 3rem;
      margin-bottom: 16px;
    }

    #overlay-msg {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 24px;
    }

    #overlay-btn {
      padding: 10px 28px;
      font-family: 'Comic Neue', cursive;
      font-size: 1rem;
      font-weight: 700;
      background: #ffff00;
      color: #000;
      border: 3px solid #fff;
      cursor: pointer;
    }
    #overlay-btn:hover { background: #fff; }

    /* BG stars */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle linear infinite;
    }
    @keyframes twinkle {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<!-- MENU -->
<div id="menu">
  <div class="game-title">Геометри Подмышка</div>
  <div class="subtitle">© 2025 Sashen Games™</div>

  <div class="levels-title">— SELECT LEVEL —</div>

  <button class="level-btn lv1" onclick="startLevel(0)">
    🟩 Easy Peasy Lemon <span class="level-stars">★★★</span>
  </button>
  <button class="level-btn lv2" onclick="startLevel(1)">
    🔥 Medium But Actually Hard <span class="level-stars">★★☆</span>
  </button>
  <button class="level-btn lv3" onclick="startLevel(2)">
    💀 IMPOSSIBLE (we mean it) <span class="level-stars">★☆☆</span>
  </button>
</div>

<!-- GAME -->
<div id="game">
  <canvas id="canvas"></canvas>
  <div id="hud">
    <span id="progress-text">0%</span>
    <span id="attempt-text">Attempt 1</span>
  </div>
  <button id="back-btn" onclick="goMenu()">← Menu</button>
  <div id="overlay">
    <div id="overlay-title"></div>
    <div id="overlay-msg"></div>
    <button id="overlay-btn" onclick="restartLevel()">RETRY</button>
  </div>
</div>

<script>
// ---- STARS ----
const starsEl = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 3 + 1;
  s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${Math.random()*3+1}s;animation-delay:${Math.random()*3}s`;
  starsEl.appendChild(s);
}

// ---- LEVELS ----
const LEVELS = [
  {
    name: "Easy Peasy Lemon",
    bg: ['#1a1a4e', '#2a2a8e'],
    ground: '#00cc44',
    playerColor: '#00ffff',
    speed: 4,
    obstacles: [
      {x:400, w:30, h:40},
      {x:600, w:30, h:40},
      {x:850, w:30, h:60},
      {x:1050, w:30, h:40},
      {x:1300, w:60, h:40},
      {x:1600, w:30, h:60},
      {x:1800, w:30, h:40},
      {x:2000, w:30, h:80},
      {x:2100, w:30, h:40},
      {x:2400, w:30, h:60},
    ],
    length: 2600
  },
  {
    name: "Medium But Actually Hard",
    bg: ['#3a1a00', '#7a3a00'],
    ground: '#ff6600',
    playerColor: '#ffff00',
    speed: 6,
    obstacles: [
      {x:300, w:30, h:40},
      {x:400, w:30, h:60},
      {x:600, w:30, h:40},
      {x:650, w:30, h:80},
      {x:900, w:30, h:60},
      {x:1000, w:30, h:40},
      {x:1100, w:30, h:60},
      {x:1300, w:60, h:40},
      {x:1400, w:30, h:80},
      {x:1700, w:30, h:40},
      {x:1750, w:30, h:60},
      {x:2000, w:30, h:40},
      {x:2100, w:30, h:80},
      {x:2300, w:60, h:60},
    ],
    length: 2600
  },
  {
    name: "IMPOSSIBLE",
    bg: ['#2a0000', '#5a0000'],
    ground: '#cc0000',
    playerColor: '#ff00ff',
    speed: 8,
    obstacles: [
      {x:200, w:30, h:40},
      {x:280, w:30, h:60},
      {x:380, w:30, h:80},
      {x:480, w:30, h:40},
      {x:540, w:30, h:60},
      {x:640, w:60, h:40},
      {x:750, w:30, h:80},
      {x:820, w:30, h:40},
      {x:900, w:30, h:60},
      {x:970, w:30, h:40},
      {x:1050, w:60, h:80},
      {x:1200, w:30, h:40},
      {x:1250, w:30, h:60},
      {x:1320, w:30, h:40},
      {x:1400, w:30, h:80},
      {x:1460, w:30, h:60},
      {x:1540, w:60, h:40},
      {x:1700, w:30, h:60},
      {x:1760, w:30, h:80},
      {x:1900, w:30, h:40},
      {x:1950, w:30, h:60},
      {x:2050, w:60, h:80},
      {x:2200, w:30, h:40},
      {x:2250, w:30, h:60},
      {x:2350, w:30, h:40},
    ],
    length: 2600
  }
];

// ---- GAME STATE ----
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let currentLevel = 0;
let attempts = 1;
let gameRunning = false;
let animId;

let player, camera, level;

const GROUND_Y_RATIO = 0.75;
const PLAYER_SIZE = 36;

function initLevel(idx) {
  currentLevel = idx;
  level = LEVELS[idx];

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const groundY = canvas.height * GROUND_Y_RATIO;

  player = {
    x: 120,
    y: groundY - PLAYER_SIZE,
    vy: 0,
    onGround: true,
    rotation: 0,
    dead: false,
    won: false
  };

  camera = { x: 0 };
  gameRunning = true;

  document.getElementById('overlay').classList.remove('show');
  document.getElementById('attempt-text').textContent = 'Attempt ' + attempts;
}

function jump() {
  if (!gameRunning) return;
  if (player.onGround && !player.dead && !player.won) {
    player.vy = -14;
    player.onGround = false;
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
});
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); });

function gameLoop() {
  if (!gameRunning) return;

  const groundY = canvas.height * GROUND_Y_RATIO;
  update(groundY);
  draw(groundY);
  animId = requestAnimationFrame(gameLoop);
}

function update(groundY) {
  if (player.dead || player.won) return;

  // gravity
  player.vy += 0.7;
  player.y += player.vy;

  // ground
  if (player.y >= groundY - PLAYER_SIZE) {
    player.y = groundY - PLAYER_SIZE;
    player.vy = 0;
    player.onGround = true;
  } else {
    player.onGround = false;
  }

  // move camera
  camera.x += level.speed;
  player.rotation += level.speed * 3;

  // progress
  const prog = Math.min(100, Math.floor((camera.x / (level.length - canvas.width)) * 100));
  document.getElementById('progress-text').textContent = prog + '%';

  // win
  if (camera.x >= level.length - canvas.width) {
    player.won = true;
    gameRunning = false;
    setTimeout(() => showOverlay(true), 400);
    return;
  }

  // obstacle collision
  for (const obs of level.obstacles) {
    const ox = obs.x - camera.x;
    const oy = groundY - obs.h;
    if (
      player.x + PLAYER_SIZE - 6 > ox &&
      player.x + 6 < ox + obs.w &&
      player.y + PLAYER_SIZE - 4 > oy &&
      player.y < oy + obs.h
    ) {
      player.dead = true;
      gameRunning = false;
      setTimeout(() => showOverlay(false), 300);
      return;
    }
  }

  // fell off bottom
  if (player.y > canvas.height) {
    player.dead = true;
    gameRunning = false;
    setTimeout(() => showOverlay(false), 300);
  }
}

function draw(groundY) {
  // background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, level.bg[0]);
  grad.addColorStop(1, level.bg[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // ground
  ctx.fillStyle = level.ground;
  ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

  // ground line
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(0, groundY, canvas.width, 2);

  // grid lines on ground (cheap GD look)
  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 1;
  const gridOff = camera.x % 40;
  for (let gx = -gridOff; gx < canvas.width; gx += 40) {
    ctx.beginPath();
    ctx.moveTo(gx, groundY);
    ctx.lineTo(gx, canvas.height);
    ctx.stroke();
  }

  // obstacles
  for (const obs of level.obstacles) {
    const ox = obs.x - camera.x;
    if (ox > canvas.width + 60 || ox < -60) continue;
    const oy = groundY - obs.h;

    // spike shape
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.moveTo(ox, groundY);
    ctx.lineTo(ox + obs.w / 2, oy);
    ctx.lineTo(ox + obs.w, groundY);
    ctx.closePath();
    ctx.fill();

    // outline
    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // end portal
  const portalX = level.length - camera.x - 60;
  if (portalX < canvas.width + 80 && portalX > -80) {
    const t = Date.now() / 500;
    ctx.strokeStyle = `hsl(${t * 60 % 360}, 100%, 60%)`;
    ctx.lineWidth = 4;
    ctx.strokeRect(portalX, groundY - 90, 50, 90);
    ctx.fillStyle = `hsla(${t * 60 % 360}, 100%, 60%, 0.2)`;
    ctx.fillRect(portalX, groundY - 90, 50, 90);
    ctx.fillStyle = '#fff';
    ctx.font = '10px Comic Neue, cursive';
    ctx.textAlign = 'center';
    ctx.fillText('END', portalX + 25, groundY - 40);
  }

  // player (rotated square)
  if (!player.dead) {
    ctx.save();
    ctx.translate(player.x + PLAYER_SIZE / 2, player.y + PLAYER_SIZE / 2);
    ctx.rotate((player.rotation * Math.PI) / 180);

    ctx.fillStyle = level.playerColor;
    ctx.fillRect(-PLAYER_SIZE/2, -PLAYER_SIZE/2, PLAYER_SIZE, PLAYER_SIZE);

    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.strokeRect(-PLAYER_SIZE/2, -PLAYER_SIZE/2, PLAYER_SIZE, PLAYER_SIZE);

    // face
    ctx.fillStyle = '#000';
    ctx.fillRect(-8, -8, 5, 5);
    ctx.fillRect(3, -8, 5, 5);
    ctx.fillRect(-6, 2, 12, 3);

    ctx.restore();
  } else {
    // death particles (cheap)
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const dist = 20;
      ctx.fillStyle = level.playerColor;
      ctx.fillRect(
        player.x + PLAYER_SIZE/2 + Math.cos(angle) * dist - 4,
        player.y + PLAYER_SIZE/2 + Math.sin(angle) * dist - 4,
        8, 8
      );
    }
  }
}

function showOverlay(won) {
  const overlay = document.getElementById('overlay');
  const title = document.getElementById('overlay-title');
  const msg = document.getElementById('overlay-msg');
  const btn = document.getElementById('overlay-btn');

  if (won) {
    title.textContent = '🎉 YOU WIN!!!';
    title.style.color = '#ffff00';
    msg.textContent = 'wow you actually did it. congrats i guess';
    btn.textContent = 'PLAY AGAIN';
  } else {
    const deathMsgs = [
      'skill issue tbh',
      'you died lmao',
      'touch grass and try again',
      'not even close bro',
      'maybe geometry isnt for you',
      'L + ratio + died',
      'the spikes said no',
    ];
    title.textContent = '💀 YOU DIED';
    title.style.color = '#ff4444';
    msg.textContent = deathMsgs[Math.floor(Math.random() * deathMsgs.length)];
    btn.textContent = 'RETRY (attempt ' + (attempts + 1) + ')';
  }

  overlay.classList.add('show');
}

function restartLevel() {
  attempts++;
  cancelAnimationFrame(animId);
  initLevel(currentLevel);
  gameLoop();
}

function startLevel(idx) {
  attempts = 1;
  document.getElementById('menu').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  initLevel(idx);
  gameLoop();
}

function goMenu() {
  cancelAnimationFrame(animId);
  gameRunning = false;
  document.getElementById('game').style.display = 'none';
  document.getElementById('menu').style.display = 'block';
}

window.addEventListener('resize', () => {
  if (document.getElementById('game').style.display === 'block') {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
});
</script>
</body>
</html>
