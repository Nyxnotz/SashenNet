<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Сайты — SashenNet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background-color: #0a0a0a;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,40,0,0.15) 2px, rgba(0,40,0,0.15) 4px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,60,0,0.07) 40px, rgba(0,60,0,0.07) 41px),
        radial-gradient(ellipse at 20% 50%, rgba(0,60,20,0.35) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(0,40,10,0.25) 0%, transparent 60%);
      color: #ccc;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .logo {
      font-size: 3rem;
      font-weight: bold;
      font-family: Georgia, serif;
      letter-spacing: -1px;
      margin-bottom: 6px;
      text-decoration: none;
    }
    .logo span:nth-child(1)  { color: #a78bfa; }
    .logo span:nth-child(2)  { color: #60a5fa; }
    .logo span:nth-child(3)  { color: #34d399; }
    .logo span:nth-child(4)  { color: #fbbf24; }
    .logo span:nth-child(5)  { color: #f87171; }
    .logo span:nth-child(6)  { color: #a78bfa; }
    .logo span:nth-child(7)  { color: #60a5fa; }
    .logo span:nth-child(8)  { color: #34d399; }
    .logo span:nth-child(9)  { color: #fbbf24; }

    .nav {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      font-size: 0.85rem;
    }
    .nav a { color: #aaa; text-decoration: none; }
    .nav a:hover { text-decoration: underline; color: #fff; }
    .nav .active { color: #fff; font-weight: bold; border-bottom: 1px solid #fff; }

    hr { border: none; border-top: 1px solid #222; width: 500px; max-width: 100%; margin: 8px 0 20px; }

    .page-title {
      width: 500px;
      max-width: 100%;
      font-size: 1rem;
      color: #fff;
      margin-bottom: 4px;
    }

    .sub {
      width: 500px;
      max-width: 100%;
      font-size: 0.75rem;
      color: #555;
      margin-bottom: 20px;
    }

    #list { width: 500px; max-width: 100%; }

    .site { margin-bottom: 18px; }
    .site-domain { font-size: 0.78rem; color: #5a9a5a; margin-bottom: 2px; }
    .site-name a { color: #8ab4f8; text-decoration: none; font-size: 1rem; }
    .site-name a:hover { text-decoration: underline; }
    .site-desc { font-size: 0.82rem; color: #888; margin-top: 2px; }

    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 0.72rem;
      color: #444;
    }
    .footer a { color: #555; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <a class="logo" href="../../index.html">
    <span>S</span><span>a</span><span>s</span><span>h</span><span>e</span><span>n</span><span>N</span><span>e</span><span>t</span>
  </a>

  <div class="nav">
    <a href="../../index.html">Web</a>
    <a href="../../index.html?site=news.sashen">News</a>
    <a href="#" class="active">Sites</a>
    <a href="../../index.html?site=about.sashen">About</a>
  </div>

  <hr>

  <div class="page-title">Все сайты SashenNet</div>
  <div class="sub" id="count">Загрузка...</div>

  <div id="list"></div>

  <div class="footer">
    <a href="../../index.html">Advertising Programs</a> · <a href="../../index.html?site=about.sashen">About SashenNet</a><br><br>
    &copy;2025 SashenNet · Searching .sashen web pages
  </div>

  <script>
    async function load() {
      const res = await fetch('../../sites.json?v=' + Date.now());
      const sites = await res.json();
      const entries = Object.entries(sites);

      document.getElementById('count').textContent = entries.length + ' сайт(ов) в сети';

      document.getElementById('list').innerHTML = entries.map(([domain, val]) => `
        <div class="site">
          <div class="site-domain">${domain}</div>
          <div class="site-name"><a href="../../index.html?site=${domain}">${val.name}</a></div>
          <div class="site-desc">${val.description}</div>
        </div>
      `).join('<hr style="border:none;border-top:1px solid #1a1a1a;margin:12px 0">');
    }
    load();
  </script>

</body>
</html>
