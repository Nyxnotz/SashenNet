<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Draw.sashen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      color: #ccc;
      user-select: none;
    }
    .toolbar {
      background: #222;
      border-bottom: 1px solid #333;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .toolbar-title { font-size: 0.9rem; font-weight: bold; color: #fff; }
    .sep { width: 1px; height: 28px; background: #333; flex-shrink: 0; }
    .tool-btn {
      height: 28px;
      padding: 0 10px;
      background: #2a2a2a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #aaa;
      font-size: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .tool-btn:hover { background: #333; color: #fff; }
    .tool-btn.active { background: #555; color: #fff; border-color: #888; }
    .swatch {
      width: 22px; height: 22px;
      border-radius: 3px;
      cursor: pointer;
      border: 2px solid transparent;
      flex-shrink: 0;
    }
    .swatch:hover { transform: scale(1.15); }
    .swatch.active { border-color: #fff; }
    input[type=color] {
      width: 28px; height: 28px;
      border: 1px solid #444; border-radius: 3px;
      cursor: pointer; padding: 1px; background: #2a2a2a;
    }
    input[type=range] { width: 80px; accent-color: #888; }
    label { font-size: 0.72rem; color: #666; white-space: nowrap; }
    .canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      overflow: auto;
    }
    #canvas {
      background: #fff;
      cursor: crosshair;
      display: block;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .bottombar {
      background: #222;
      border-top: 1px solid #333;
      padding: 4px 12px;
      font-size: 0.68rem;
      color: #555;
      display: flex; gap: 16px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-title">Draw.sashen</span>
  <div class="sep"></div>

  <button class="tool-btn active" id="t-pencil" onclick="setTool('pencil')" title="P">Карандаш</button>
  <button class="tool-btn" id="t-brush" onclick="setTool('brush')" title="B">Кисть</button>
  <button class="tool-btn" id="t-eraser" onclick="setTool('eraser')" title="E">Ластик</button>
  <button class="tool-btn" id="t-fill" onclick="setTool('fill')" title="F">Заливка</button>
  <button class="tool-btn" id="t-line" onclick="setTool('line')" title="L">Линия</button>
  <button class="tool-btn" id="t-rect" onclick="setTool('rect')" title="R">Прямоугольник</button>
  <button class="tool-btn" id="t-circle" onclick="setTool('circle')" title="C">Эллипс</button>
  <button class="tool-btn" id="t-eye" onclick="setTool('eye')" title="I">Пипетка</button>

  <div class="sep"></div>

  <label>Размер</label>
  <input type="range" id="size" min="1" max="80" value="6" oninput="brushSize=+this.value; document.getElementById('sizeVal').textContent=this.value+'px'">
  <label id="sizeVal">6px</label>

  <div class="sep"></div>

  <label>Прозр.</label>
  <input type="range" id="opac" min="1" max="100" value="100" oninput="brushOpacity=this.value/100; document.getElementById('opacVal').textContent=this.value+'%'">
  <label id="opacVal">100%</label>

  <div class="sep"></div>

  <div id="palette" style="display:flex;gap:3px;flex-wrap:wrap;max-width:220px"></div>
  <input type="color" id="colorInput" value="#000000" oninput="setColor(this.value)" title="Свой цвет">

  <div class="sep"></div>

  <button class="tool-btn" onclick="undoAction()" title="Ctrl+Z">Отмена</button>
  <button class="tool-btn" onclick="redoAction()" title="Ctrl+Y">Повтор</button>
  <button class="tool-btn" onclick="clearCanvas()">Очистить</button>
  <button class="tool-btn" onclick="saveImg()">Скачать PNG</button>

  <div class="sep"></div>

  <select id="canvSize" onchange="changeSize()" style="background:#2a2a2a;border:1px solid #333;color:#aaa;padding:4px;font-size:0.75rem;border-radius:3px">
    <option value="800,600">800x600</option>
    <option value="1280,720">1280x720</option>
    <option value="600,600">600x600</option>
    <option value="400,400">400x400</option>
  </select>

  <label>Зум</label>
  <button class="tool-btn" onclick="setZoom(zoom-0.25)" style="padding:0 8px">-</button>
  <label id="zoomVal">100%</label>
  <button class="tool-btn" onclick="setZoom(zoom+0.25)" style="padding:0 8px">+</button>
</div>

<div class="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<div class="bottombar">
  <span id="pos">x:0 y:0</span>
  <span id="toolName">Карандаш</span>
  <span id="colorShow">Цвет: #000000</span>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let tool = 'pencil';
let brushColor = '#000000';
let brushSize = 6;
let brushOpacity = 1;
let zoom = 1;
let drawing = false;
let sx, sy, lx, ly;
let snapshot;
let undoStack = [], redoStack = [];

const COLORS = ['#000','#fff','#f00','#ff6600','#ffff00','#00cc00','#0055ff','#8800cc','#ff00aa','#00bbbb','#8B4513','#888','#fbb','#bfb','#bbf','#ffebb5'];

function initCanvas(w, h) {
  canvas.width = w;
  canvas.height = h;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, w, h);
  undoStack = []; redoStack = [];
  saveUndo();
  applyZoom();
}

function applyZoom() {
  canvas.style.width = canvas.width * zoom + 'px';
  canvas.style.height = canvas.height * zoom + 'px';
  document.getElementById('zoomVal').textContent = Math.round(zoom*100) + '%';
}

function setZoom(z) {
  zoom = Math.min(4, Math.max(0.25, z));
  applyZoom();
}

function changeSize() {
  const [w, h] = document.getElementById('canvSize').value.split(',').map(Number);
  if (confirm('Изменить размер? Рисунок будет очищен.')) initCanvas(w, h);
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: Math.round((src.clientX - rect.left) / zoom),
    y: Math.round((src.clientY - rect.top) / zoom)
  };
}

function setColor(c) {
  brushColor = c;
  document.getElementById('colorInput').value = c;
  document.getElementById('colorShow').textContent = 'Цвет: ' + c;
  document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', s.dataset.c === c));
}

const toolNames = {pencil:'Карандаш',brush:'Кисть',eraser:'Ластик',fill:'Заливка',line:'Линия',rect:'Прямоугольник',circle:'Эллипс',eye:'Пипетка'};

function setTool(t) {
  tool = t;
  document.querySelectorAll('.tool-btn[id^="t-"]').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('t-'+t);
  if (btn) btn.classList.add('active');
  document.getElementById('toolName').textContent = toolNames[t] || t;
}

function saveUndo() {
  undoStack.push(canvas.toDataURL());
  if (undoStack.length > 30) undoStack.shift();
  redoStack = [];
}

function restoreData(dataUrl) {
  const img = new Image();
  img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); };
  img.src = dataUrl;
}

function undoAction() {
  if (undoStack.length <= 1) return;
  redoStack.push(undoStack.pop());
  restoreData(undoStack[undoStack.length-1]);
}

function redoAction() {
  if (!redoStack.length) return;
  const d = redoStack.pop();
  undoStack.push(d);
  restoreData(d);
}

function hexToRgb(hex) {
  const h = hex.replace('#','');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
}

function applyCtx(erase) {
  ctx.globalCompositeOperation = erase ? 'destination-out' : 'source-over';
  const [r,g,b] = hexToRgb(brushColor);
  ctx.strokeStyle = `rgba(${r},${g},${b},${brushOpacity})`;
  ctx.fillStyle = `rgba(${r},${g},${b},${brushOpacity})`;
  ctx.lineWidth = brushSize;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowBlur = tool === 'brush' ? brushSize * 0.8 : 0;
  ctx.shadowColor = ctx.strokeStyle;
}

function floodFill(x, y) {
  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const d = imgData.data;
  const W = canvas.width, H = canvas.height;
  const i0 = (y * W + x) * 4;
  const [tr, tg, tb, ta] = [d[i0], d[i0+1], d[i0+2], d[i0+3]];
  const [fr, fg, fb] = hexToRgb(brushColor);
  const fa = Math.round(brushOpacity * 255);
  if (tr===fr && tg===fg && tb===fb && ta===fa) return;
  const stack = [[x, y]];
  const visited = new Uint8Array(W * H);
  while (stack.length) {
    const [cx, cy] = stack.pop();
    if (cx<0||cx>=W||cy<0||cy>=H) continue;
    const i = cy*W+cx;
    if (visited[i]) continue;
    const pi = i*4;
    if (d[pi]!==tr||d[pi+1]!==tg||d[pi+2]!==tb||d[pi+3]!==ta) continue;
    visited[i] = 1;
    d[pi]=fr; d[pi+1]=fg; d[pi+2]=fb; d[pi+3]=fa;
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
  ctx.putImageData(imgData, 0, 0);
}

function pickColor(x, y) {
  const p = ctx.getImageData(x, y, 1, 1).data;
  if (p[3]===0) return;
  const hex = '#'+[p[0],p[1],p[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
  setColor(hex);
  setTool('pencil');
}

canvas.addEventListener('mousedown', e => {
  const pos = getPos(e);
  if (tool === 'fill') { saveUndo(); floodFill(pos.x, pos.y); return; }
  if (tool === 'eye') { pickColor(pos.x, pos.y); return; }
  drawing = true;
  sx = lx = pos.x; sy = ly = pos.y;
  if (['line','rect','circle'].includes(tool)) {
    snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
  }
  saveUndo();
  if (['pencil','brush','eraser'].includes(tool)) {
    applyCtx(tool==='eraser');
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, brushSize/2, 0, Math.PI*2);
    ctx.fill();
  }
});

canvas.addEventListener('mousemove', e => {
  const pos = getPos(e);
  document.getElementById('pos').textContent = `x:${pos.x} y:${pos.y}`;
  if (!drawing) return;

  if (['pencil','brush','eraser'].includes(tool)) {
    applyCtx(tool==='eraser');
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    lx = pos.x; ly = pos.y;
  } else if (snapshot) {
    ctx.putImageData(snapshot, 0, 0);
    applyCtx(false);
    ctx.beginPath();
    if (tool === 'line') {
      ctx.moveTo(sx, sy); ctx.lineTo(pos.x, pos.y); ctx.stroke();
    } else if (tool === 'rect') {
      ctx.strokeRect(sx, sy, pos.x-sx, pos.y-sy);
    } else if (tool === 'circle') {
      ctx.ellipse(sx+(pos.x-sx)/2, sy+(pos.y-sy)/2, Math.abs(pos.x-sx)/2, Math.abs(pos.y-sy)/2, 0, 0, Math.PI*2);
      ctx.stroke();
    }
  }
});

canvas.addEventListener('mouseup', () => { drawing = false; snapshot = null; });
canvas.addEventListener('mouseleave', () => { drawing = false; snapshot = null; });

canvas.addEventListener('touchstart', e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousedown', {clientX:e.touches[0].clientX, clientY:e.touches[0].clientY})); }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousemove', {clientX:e.touches[0].clientX, clientY:e.touches[0].clientY})); }, {passive:false});
canvas.addEventListener('touchend', e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mouseup')); }, {passive:false});

document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key==='z') { e.preventDefault(); undoAction(); }
  if (e.ctrlKey && e.key==='y') { e.preventDefault(); redoAction(); }
  const keys = {p:'pencil',b:'brush',e:'eraser',f:'fill',l:'line',r:'rect',c:'circle',i:'eye'};
  if (keys[e.key]) setTool(keys[e.key]);
});

function clearCanvas() {
  if (!confirm('Очистить холст?')) return;
  saveUndo();
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function saveImg() {
  const link = document.createElement('a');
  link.download = 'draw.png';
  link.href = canvas.toDataURL();
  link.click();
}

// Build palette
const pal = document.getElementById('palette');
for (const c of COLORS) {
  const div = document.createElement('div');
  div.className = 'swatch' + (c==='#000'?' active':'');
  div.style.background = c;
  div.dataset.c = c;
  div.onclick = () => setColor(c);
  pal.appendChild(div);
}

initCanvas(800, 600);
</script>
</body>
</html>
