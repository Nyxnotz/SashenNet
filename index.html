<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SashenNet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background-color: #0a0a0a;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,40,0,0.15) 2px, rgba(0,40,0,0.15) 4px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,60,0,0.07) 40px, rgba(0,60,0,0.07) 41px),
        radial-gradient(ellipse at 20% 50%, rgba(0,60,20,0.35) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(0,40,10,0.25) 0%, transparent 60%);
      color: #ccc;
    }

    /* SEARCH PAGE */
    #search-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .logo {
      font-size: 5rem;
      font-weight: bold;
      font-family: Georgia, serif;
      letter-spacing: -1px;
      margin-bottom: 16px;
      line-height: 1;
    }
    .logo span:nth-child(1)  { color: #a78bfa; }
    .logo span:nth-child(2)  { color: #60a5fa; }
    .logo span:nth-child(3)  { color: #34d399; }
    .logo span:nth-child(4)  { color: #fbbf24; }
    .logo span:nth-child(5)  { color: #f87171; }
    .logo span:nth-child(6)  { color: #a78bfa; }
    .logo span:nth-child(7)  { color: #60a5fa; }
    .logo span:nth-child(8)  { color: #34d399; }
    .logo span:nth-child(9)  { color: #fbbf24; }

    .nav {
      display: flex;
      gap: 16px;
      margin-bottom: 14px;
      font-size: 0.85rem;
    }
    .nav a {
      color: #aaa;
      text-decoration: none;
    }
    .nav a:hover { text-decoration: underline; color: #fff; }
    .nav .active { color: #fff; font-weight: bold; border-bottom: 1px solid #fff; }

    .search-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    #q {
      width: 380px;
      max-width: 90vw;
      padding: 4px 6px;
      font-size: 1rem;
      border: 1px solid #555;
      background: #1a1a1a;
      color: #eee;
      outline: none;
    }
    #q:focus { border-color: #888; }

    .search-row button {
      padding: 4px 14px;
      font-size: 0.85rem;
      background: #2a2a2a;
      color: #ccc;
      border: 1px solid #555;
      cursor: pointer;
    }
    .search-row button:hover { background: #3a3a3a; color: #fff; }

    .tagline {
      font-size: 0.72rem;
      color: #555;
      margin-top: 6px;
      letter-spacing: 0.05em;
    }

    .divider {
      border: none;
      border-top: 1px solid #222;
      width: 420px;
      max-width: 90vw;
      margin: 20px 0;
    }

    #results { width: 420px; max-width: 90vw; }

    .result { margin-bottom: 18px; }
    .result-domain { font-size: 0.78rem; color: #5a9a5a; margin-bottom: 2px; }
    .result-name a { color: #8ab4f8; text-decoration: none; font-size: 1rem; }
    .result-name a:hover { text-decoration: underline; }
    .result-desc { font-size: 0.82rem; color: #888; margin-top: 2px; }
    .no-results { color: #666; font-size: 0.85rem; }

    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 0.72rem;
      color: #444;
    }
    .footer a { color: #555; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    /* VIEWER */
    #viewer { display: none; width: 100%; height: 100vh; }
    #viewer iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>

<div id="search-page">
  <div class="logo">
    <span>S</span><span>a</span><span>s</span><span>h</span><span>e</span><span>n</span><span>N</span><span>e</span><span>t</span>
  </div>

  <div class="nav">
    <a href="https://nyxnotz.github.io/SashenNet/" class="active">Web</a>
    <a href="?site=news.sashen">News</a>
    <a href="?site=sites.sashen">Sites</a>
    <a href="?site=about.sashen">About</a>
  </div>

  <div class="search-row">
    <input id="q" type="text" autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter')search()">
    <button onclick="search()">Search</button>
    <button onclick="lucky()">I'm Feeling Lucky</button>
  </div>
  <div class="tagline">Search SashenNet...</div>

  <hr class="divider">
  <div id="results"></div>

  <div class="footer">
    <a href="">Advertising Programs</a> · <a href="?site=about.sashen">About SashenNet</a><br><br>
    &copy;2025 SashenNet · Searching .sashen web pages
  </div>
</div>

<div id="viewer">
  <iframe id="viewer-frame"></iframe>
</div>

<script>
  async function getSites() {
    const res = await fetch('sites.json?v=' + Date.now());
    return res.json();
  }

  async function search() {
    const q = document.getElementById('q').value.toLowerCase().trim();
    const container = document.getElementById('results');
    if (!q) { container.innerHTML = ''; return; }

    const sites = await getSites();
    const results = Object.entries(sites).filter(([domain, val]) =>
      domain.includes(q) ||
      val.name.toLowerCase().includes(q) ||
      val.description.toLowerCase().includes(q) ||
      (val.tags || []).some(t => t.toLowerCase().includes(q))
    );

    if (!results.length) {
      container.innerHTML = '<div class="no-results">No sites found for "<b>' + q + '</b>".</div>';
      return;
    }

    container.innerHTML = results.map(([domain, val]) => `
      <div class="result">
        <div class="result-domain">${domain}</div>
        <div class="result-name"><a href="#" onclick="openSite('${domain}'); return false;">${val.name}</a></div>
        <div class="result-desc">${val.description}</div>
      </div>
    `).join('');
  }

  async function lucky() {
    const sites = await getSites();
    const keys = Object.keys(sites);
    if (keys.length) openSite(keys[Math.floor(Math.random() * keys.length)]);
  }

  function openSite(domain) {
    history.pushState({}, '', '?site=' + domain);
    document.getElementById('search-page').style.display = 'none';
    document.getElementById('viewer').style.display = 'block';
    document.getElementById('viewer-frame').src = 'sites/' + domain + '/index.html';
  }

  window.addEventListener('popstate', () => {
    const params = new URLSearchParams(window.location.search);
    if (params.get('site')) {
      openSite(params.get('site'));
    } else {
      document.getElementById('search-page').style.display = 'flex';
      document.getElementById('viewer').style.display = 'none';
      document.getElementById('viewer-frame').src = '';
    }
  });

  const params = new URLSearchParams(window.location.search);
  if (params.get('site')) openSite(params.get('site'));
</script>
</body>
</html>
